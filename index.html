  .header-left h1 span { color: var(--accent); }

  .header-left p { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
  .header-right { display: flex; gap: 12px; align-items: center; }

  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); font-weight: 600; }

  .action-btn { 
    background: #1a1a1a; 
    color: #ffffff; 
    border: 1px solid #1a1a1a; 
    border-radius: 6px; 
    font-family: 'DM Sans', sans-serif; 
    font-size: 11px; 
    font-weight: 700; 
    padding: 10px 22px; 
    cursor: pointer; 
    transition: all 0.2s; 
    text-transform: uppercase;
    letter-spacing: 0.12em;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }
  .action-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(139, 111, 63, 0.3); }

  /* ─── TABS ─── */

  .tab { padding: 10px 18px; font-size: 13px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500; }

  /* ─── STATS & OBS ─── */

  .stat-card .label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; margin-bottom: 8px; }
  .stat-card .value { font-size: 24px; font-family: 'DM Serif Display', serif; }
  .stat-card .sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .stat-card .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; margin-top: 6px; font-weight: 500; }
  .badge.pos { background: var(--green-bg); color: var(--green); }
  .badge.neg { background: var(--red-bg); color: var(--red); }

  .obs-wrapper { padding: 20px 40px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .obs-card { background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 18px 22px; box-shadow: var(--shadow); }
  .obs-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .obs-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; list-style: none; }
  .obs-list li { font-size: 13px; color: var(--text2); line-height: 1.4; position: relative; padding-left: 18px; }
  .obs-list li::before { content: "→"; color: var(--accent); position: absolute; left: 0; font-weight: bold; }

  /* ─── MAIN ─── */

  .company-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); }

  .company-header:hover { background: var(--bg-hover); }
  .company-icon { position: relative; width: 44px; height: 44px; border-radius: 9px; border: 1px solid var(--border); background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .logo-img { position: absolute; width: 100%; height: 100%; object-fit: contain; padding: 6px; z-index: 2; }
  .logo-fallback { font-family: 'DM Serif Display'; font-size: 14px; color: var(--text3); }
  .company-body { display: none; border-top: 1px solid var(--border); background: var(--bg3); padding: 20px; }
  .company-block.expanded .company-body { display: block; }
  
  .fin-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
  .fin-table th { font-family: 'DM Mono'; font-size: 10px; color: var(--text3); text-transform: uppercase; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: right; }
  .fin-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: 'DM Mono'; text-align: right; }
  .fin-table td:first-child, .fin-table th:first-child { text-align: left; font-family: 'DM Sans'; font-weight: 600; }
  .fin-table tr.qoq td { font-size: 11px; color: var(--text3); padding-top: 2px; padding-bottom: 10px; }
  .fin-table td.annual { font-weight: 600; background: var(--bg-annual); }
  .fin-table td.yoy-cell { background: var(--bg-yoy); }

  /* ─── NEWS SECTION ─── */
  .news-box { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .news-header { font-size: 11px; font-family: 'DM Mono'; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
  .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .news-item { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-decoration: none; transition: 0.15s; display: block; }
  .news-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .news-source { font-size: 10px; color: var(--accent); font-family: 'DM Mono'; margin-bottom: 4px; text-transform: uppercase; }
  .news-title { font-size: 12.5px; color: var(--text); font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .news-date { font-size: 10px; color: var(--text3); margin-top: 8px; font-family: 'DM Mono'; }

  .tag { font-family: 'DM Mono'; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid; margin-left: 8px; }

  .tag.homedecor { border-color: rgba(138,90,160,0.25); color: var(--homedecor); background: rgba(138,90,160,0.05); }

  .pct.pos { color: var(--green); }
  .pct.neg { color: var(--red); }
  .hidden { display: none; }

  @media (max-width: 900px) { .header { flex-direction: column; align-items: flex-start; gap: 15px; } .header-right { width: 100%; justify-content: space-between; } }
</style>
</head>

    fy25:{ rev:[null,null,385,null], op:[null,null,20,null], annual_rev:385, annual_op:20 },
    fy26:{ rev:[null,377,421,null], op:[null,41,59,null], annual_rev:798, annual_op:100 },
    yoy_rev:[null,null,0.0935,null], yoy_op:[null,null,1.95,null] }
];

let activeFilter = 'all';

const fmt = v => (v === null || v === undefined) ? '—' : v.toLocaleString('en-IN', {maximumFractionDigits:1});
const pct = v => {
  if (v === null || v === undefined) return '—';
  const val = (v * 100).toFixed(1);
  return `<span class="pct ${v >= 0 ? 'pos' : 'neg'}">${v >= 0 ? '+' : ''}${val}%</span>`;
};
function qoqPct(arr, i) {
  if (i === 0 || !arr[i-1] || !arr[i]) return null;
  return (arr[i] - arr[i-1]) / Math.abs(arr[i-1]);
}

function handleLogoError(img) {
  const sources = JSON.parse(img.dataset.sources);
  let idx = parseInt(img.dataset.idx) + 1;
  if (idx < sources.length) {
    img.dataset.idx = idx;
    img.src = sources[idx];
  } else {
    img.classList.add('hidden');
  }
}

/** * UPDATED: Expands all filtered blocks instantly and 
 * fires news requests in parallel background tasks.
 */
async function toggleAllTiles() {
  const btn = document.getElementById('toggleAllBtn');
  const blocks = document.querySelectorAll('.company-block:not(.hidden)');
  const currentState = btn.getAttribute('data-state');
  const isOpening = currentState === 'collapsed';

  if (isOpening) {
    btn.setAttribute('data-state', 'expanded');
    btn.innerText = "Collapse All";
    
    // 1. Instantly expand every visible block
    blocks.forEach(block => {
      block.classList.add('expanded');
      const idx = block.getAttribute('data-idx');
      // 2. Fire news fetch without 'await' to allow parallel execution
      loadNewsForCompany(idx);
    });

  } else {
    btn.setAttribute('data-state', 'collapsed');
    btn.innerText = "Expand All";
    blocks.forEach(block => block.classList.remove('expanded'));
  }
}

async function loadNewsForCompany(idx) {
  const co = COMPANIES[idx];
  const container = document.getElementById(`news-grid-${idx}`);
  if (!container || container.dataset.loaded === "true") return;

  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(co.searchQuery + ' when:60d')}&hl=en-IN&gl=IN&ceid=IN:en`;
  
  try {
    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
    const data = await response.json();
    if (data.contents) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(data.contents, "text/xml");
        const items = Array.from(xml.querySelectorAll("item")).map(i => ({
            title: i.querySelector("title").textContent,
            link: i.querySelector("link").textContent,
            pubDate: i.querySelector("pubDate").textContent,
            author: i.querySelector("source") ? i.querySelector("source").textContent : "News"
        }));
        if (items.length > 0) {
            renderNews(container, items);
            return;
        }
    }
    throw new Error("No news found");
  } catch (err) {
    container.innerHTML = `<div style="font-size:12px; color:var(--text3); padding:10px;">No recent intel found in the last 60 days. <a href="https://news.google.com/search?q=${encodeURIComponent(co.searchQuery + ' when:60d')}" target="_blank" style="color:var(--accent); text-decoration:none;">View on Google News →</a></div>`;
  }
}

function renderNews(container, items) {
    container.innerHTML = items.slice(0, 4).map(item => `
        <a href="${item.link}" class="news-item" target="_blank">
          <div class="news-source">${item.author || item.source || 'Intel'}</div>
          <div class="news-title">${item.title}</div>
          <div class="news-date">${new Date(item.pubDate || item.date).toLocaleDateString('en-IN', {day:'numeric', month:'short'})}</div>
        </a>
      `).join('');
    container.dataset.loaded = "true";
}

function buildDetailedTable(co) {
  const fy25r=co.fy25.rev, fy25o=co.fy25.op;
  const fy26r=co.fy26.rev, fy26o=co.fy26.op;
  const qoq25r=[0,1,2,3].map(i=>qoqPct(fy25r,i)), qoq25o=[0,1,2,3].map(i=>qoqPct(fy25o,i));
  const qoq26r=[0,1,2,3].map(i=>qoqPct(fy26r,i)), qoq26o=[0,1,2,3].map(i=>qoqPct(fy26o,i));
  
  return `
    <table class="fin-table">
      <thead>
        <tr>
          <th rowspan="2">Metric</th>
          <th colspan="5" style="text-align:center; border-right:1px solid var(--border)">FY 2025</th>
          <th colspan="5" style="text-align:center; border-right:1px solid var(--border)">FY 2026</th>
          <th colspan="3" style="text-align:center">YoY Growth</th>
        </tr>
        <tr>
          <th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th style="border-right:1px solid var(--border)">Annual</th>
          <th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th style="border-right:1px solid var(--border)">YTD</th>
          <th>Q1</th><th>Q2</th><th>Q3</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Revenue</td>
          ${fy25r.map(v=>`<td>${fmt(v)}</td>`).join('')}
          <td class="annual" style="border-right:1px solid var(--border)">${fmt(co.fy25.annual_rev)}</td>
          ${fy26r.map(v=>`<td>${fmt(v)}</td>`).join('')}
          <td class="annual" style="border-right:1px solid var(--border)">${fmt(co.fy26.annual_rev)}</td>
          ${co.yoy_rev.slice(0,3).map(v=>`<td class="yoy-cell">${pct(v)}</td>`).join('')}
        </tr>
        <tr class="qoq">
          <td>QoQ %</td>
          ${qoq25r.map(v=>`<td>${pct(v)}</td>`).join('')}
          <td style="border-right:1px solid var(--border)"></td>
          ${qoq26r.map(v=>`<td>${pct(v)}</td>`).join('')}
          <td style="border-right:1px solid var(--border)"></td>
          <td colspan="3"></td>
        </tr>
        <tr>
          <td>Op. Profit</td>
          ${fy25o.map(v=>`<td>${fmt(v)}</td>`).join('')}
          <td class="annual" style="border-right:1px solid var(--border)">${fmt(co.fy25.annual_op)}</td>
          ${fy26o.map(v=>`<td>${fmt(v)}</td>`).join('')}
          <td class="annual" style="border-right:1px solid var(--border)">${fmt(co.fy26.annual_op)}</td>
          ${co.yoy_op.slice(0,3).map(v=>`<td class="yoy-cell">${pct(v)}</td>`).join('')}
        </tr>
        <tr class="qoq">
          <td>QoQ %</td>
          ${qoq25o.map(v=>`<td>${pct(v)}</td>`).join('')}
          <td style="border-right:1px solid var(--border)"></td>
          ${qoq26o.map(v=>`<td>${pct(v)}</td>`).join('')}
          <td style="border-right:1px solid var(--border)"></td>
          <td colspan="3"></td>
        </tr>
      </tbody>
    </table>`;
}

function updateObservations() {
  const filtered = activeFilter === 'all' ? COMPANIES : COMPANIES.filter(c => c.category === activeFilter);
  const avgYoy = filtered.reduce((s, c) => s + (c.yoy_rev[2] || 0), 0) / filtered.length;
  let bullets = [];
  if (activeFilter === 'all') {
    bullets = [
      `Overall retail health is stable with an aggregate growth of <b>${(avgYoy*100).toFixed(1)}%</b>.`,
      `<b>Trent</b> continues its dominance in value retail, significantly outpacing peers.`,
      `Margins are stable for brands with wedding-wear focus but challenged in mass apparel.`
    ];
  } else if (activeFilter === 'Apparel') {
    bullets = [
      `Apparel segment shows a strong <b>Q3 festive rebound</b> across most formats.`,
      `Innerwear segment (Page, Rupa) maintains steady YTD revenue momentum.`,
      `Marketing spends are high as ABFRL and Raymond scale their portfolios.`
    ];
  } else {
    bullets = [
      `Home Décor demand remains conservative compared to high-frequency apparel.`,
      `<b>Bella Casa</b> remains the group outlier with robust triple-digit growth potential.`,
      `Premium formats are seeing longer sales cycles but better unit economics.`
    ];
  }
  document.getElementById('obsWrapper').innerHTML = `<div class="obs-card"><div class="obs-title">📝 Dynamic Commentary — ${activeFilter.toUpperCase()}</div><ul class="obs-list">${bullets.map(b => `<li>${b}</li>`).join('')}</ul></div>`;
}

function renderAll() {
  const filtered = activeFilter === 'all' ? COMPANIES : COMPANIES.filter(c => c.category === activeFilter);
  const apparelN = filtered.filter(c=>c.category==='Apparel').length;
  const revTotal = filtered.reduce((s,c) => s + (c.fy26.rev[0]||0) + (c.fy26.rev[1]||0) + (c.fy26.rev[2]||0), 0);
  const cosGrowing = filtered.filter(c => (c.yoy_rev[2]||0) > 0).length;
  const avgYoy = filtered.reduce((s,c) => s + (c.yoy_rev[2]||0), 0) / filtered.length;
  const growingPct = ((cosGrowing / filtered.length) * 100).toFixed(0);
  const avgYoyVal = (avgYoy * 100).toFixed(1);
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div><div class="label">Companies Tracked</div><div class="value">${filtered.length}</div></div><div class="sub">${apparelN} Apparel · ${filtered.length-apparelN} Home Décor</div></div>
    <div class="stat-card"><div><div class="label">FY26 YTD Revenue (Q1-Q3)</div><div class="value">₹${(revTotal/1000).toFixed(0)}K Cr.</div></div><div class="sub">Aggregate standalone</div></div>
    <div class="stat-card"><div><div class="label">Growing YoY in Q3 FY26</div><div class="value">${cosGrowing} / ${filtered.length}</div></div><span class="badge pos">${growingPct}% growing</span></div>
    <div class="stat-card"><div><div class="label">Avg. YoY Rev Growth (Q3 FY26)</div><div class="value">${avgYoyVal}%</div></div><span class="badge pos">+${avgYoyVal}%</span></div>
    <div class="stat-card"><div><div class="label">Q4 FY26 Data</div><div class="value" style="font-size:18px;">Awaited</div></div><div class="sub">Results expected May–Jun 2026</div></div>
  `;

  document.getElementById('financialsContent').innerHTML = COMPANIES.map((co, i) => {
    const hidden = activeFilter !== 'all' && co.category !== activeFilter;
    const logos = [`https://logo.clearbit.com/${co.domain}`, `https://www.google.com/s2/favicons?domain=${co.domain}&sz=128`];
    return `<div class="company-block ${hidden ? 'hidden' : ''}" data-idx="${i}"><div class="company-header" onclick="this.parentElement.classList.toggle('expanded'); loadNewsForCompany(${i});"><div style="display:flex; align-items:center; gap:12px;"><div class="company-icon"><span class="logo-fallback">${co.initials}</span><img class="logo-img" src="${logos[0]}" data-sources='${JSON.stringify(logos)}' data-idx="0" onerror="handleLogoError(this)"></div><div><b>${co.name}</b> <span class="tag ${co.category==='Apparel'?'apparel':'homedecor'}">${co.category}</span></div></div><div style="font-family:'DM Mono'; font-size:12px;">₹${fmt(co.fy26.rev[2])} Cr (Q3) <span style="margin-left:8px;">▼</span></div></div><div class="company-body"><div style="overflow-x:auto;">${buildDetailedTable(co)}</div><div class="news-box"><div class="news-header"><span>Market Intelligence (Last 60 Days)</span></div><div class="news-grid" id="news-grid-${i}"><div style="font-size:12px; color:var(--text3)">Expand to load intel...</div></div></div></div></div>`;
  }).join('');

  document.getElementById('summaryBody').innerHTML = filtered.map(co => {
    const q3rev = co.fy26.rev[2];
    const qoq = qoqPct(co.fy26.rev, 2);
    const margin = q3rev ? (co.fy26.op[2] / q3rev) * 100 : 0;
    return `<tr><td style="text-align:left"><b>${co.name}</b></td><td style="text-align:left"><span class="tag ${co.category==='Apparel'?'apparel':'homedecor'}">${co.category}</span></td><td>${fmt(q3rev)}</td><td>${pct(co.yoy_rev[2])}</td><td>${pct(qoq)}</td><td>${fmt(co.fy26.op[2])}</td><td>${margin.toFixed(1)}%</td></tr>`;
  }).join('');
  
  updateObservations();
}

document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelector('.filter-btn.active').classList.remove('active'); btn.classList.add('active'); activeFilter = btn.dataset.filter; const toggleBtn = document.getElementById('toggleAllBtn'); toggleBtn.innerText = "Expand All"; toggleBtn.setAttribute('data-state', 'collapsed'); renderAll(); }));
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => { document.querySelector('.tab.active').classList.remove('active'); tab.classList.add('active'); const isLatest = tab.dataset.tab === 'latest'; document.getElementById('financialsContent').classList.toggle('hidden', isLatest); document.getElementById('latestQuarterContent').classList.toggle('hidden', !isLatest); }));

renderAll();
</script>
</body>
